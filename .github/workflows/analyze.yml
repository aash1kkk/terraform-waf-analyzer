name: Terraform WAF Analysis

on:
  push:
    paths: ['**.tf']
  pull_request:
    paths: ['**.tf']

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Collect and zip all .tf files
        run: |
          find . -name "*.tf" -not -path "./.git/*" | zip tf_bundle.zip -@
          echo "RUN_ID=${{ github.sha }}" >> $GITHUB_ENV

      - name: Upload bundle to S3
        run: |
          aws s3 cp tf_bundle.zip \
            s3://${{ secrets.TF_UPLOAD_BUCKET }}/runs/${{ env.RUN_ID }}/tf_bundle.zip

      - name: Invoke analyzer Lambda and wait
        run: |
          aws lambda invoke \
            --function-name tf-waf-analyzer \
            --payload "{\"run_id\": \"${{ env.RUN_ID }}\", \"branch\": \"${{ github.ref_name }}\", \"commit_msg\": \"${{ github.event.pull_request.title || github.event.head_commit.message }}\"}" \
            --cli-binary-format raw-in-base64-out \
            --log-type Tail \
            response.json
          cat response.json

      - name: Get report download URL
        run: |
          REPORT_URL=$(cat response.json | python3 -c \
            "import sys,json; print(json.load(sys.stdin)['report_url'])")
          echo "Report: $REPORT_URL"
          echo "REPORT_URL=$REPORT_URL" >> $GITHUB_ENV

      - name: Upload JSON report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: waf-report-${{ github.sha }}
          path: response.json